<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ۲۰ بازی آنلاین | رهیلا</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial';background:linear-gradient(135deg,#e3f2fd,#bbdefb,#90caf9,#a5d6a7);color:#111;padding:15px;min-height:100vh;text-align:center}
        .header{background:#fff;border-radius:20px;padding:18px;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
        .header h1{color:#0d47a1;font-size:22px}
        .back-btn{display:inline-block;background:#0d47a1;color:#fff;padding:10px 25px;border-radius:20px;text-decoration:none;margin:10px 0}
        .game-zone{background:#fff;border-radius:20px;padding:20px;margin:15px 0;box-shadow:0 2px 10px rgba(0,0,0,.08)}
        .game-zone h2{color:#0d47a1;margin-bottom:10px}
        input{padding:10px;font-size:18px;width:120px;text-align:center;border-radius:8px;border:2px solid #0d47a1;margin:5px}
        button{padding:10px 20px;font-size:15px;background:#0d47a1;color:#fff;border:none;border-radius:8px;cursor:pointer;margin:3px}
        button:active{background:#1565c0}
        .result{font-size:18px;color:#0d47a1;font-weight:bold;margin:8px 0}
        canvas{background:#f0f0f0;border-radius:10px;margin:10px auto;display:block}
    </style>
</head>
<body>
    <div class="header"><h1>🎮 ۲۰ بازی آنلاین</h1><p>همه بازی‌ها فعال و رایگان | rahilanab.com</p></div>
    <a href="index.html" class="back-btn">🔙 خانه</a>

<!-- ۱. حدس عدد --><div class="game-zone"><h2>۱. 🎯 حدس عدد</h2><p>یه عدد بین ۱ تا ۱۰۰ حدس بزن</p><input id="g1in" type="number" placeholder="عدد"><br><button onclick="g1check()">حدس بزن</button><p class="result" id="g1r"></p><p id="g1t"></p></div>

<!-- ۲. سنگ کاغذ قیچی --><div class="game-zone"><h2>۲. ✂️ سنگ کاغذ قیچی</h2><button onclick="rps('✊')">✊</button><button onclick="rps('✋')">✋</button><button onclick="rps('✌️')">✌️</button><p class="result" id="rpsR"></p></div>

<!-- ۳. سرعت کلیک --><div class="game-zone"><h2>۳. ⚡ سرعت کلیک</h2><p style="font-size:35px" id="clkT">10</p><button onclick="clkTap()" style="padding:20px 40px;font-size:20px">کلیک کن!</button><p class="result" id="clkR"></p></div>

<!-- ۴. ریاضی سریع --><div class="game-zone"><h2>۴. 🔢 ریاضی سریع</h2><p style="font-size:28px" id="mQ"></p><input id="mIn" type="number" placeholder="جواب"><button onclick="mCheck()">جواب</button><p class="result" id="mR"></p></div>

<!-- ۵. حافظه رنگ --><div class="game-zone"><h2>۵. 🧠 حافظه رنگ</h2><div id="cBox" style="width:60px;height:60px;border-radius:10px;background:gray;margin:8px auto"></div><div id="cBtns"></div><button onclick="memStart()">شروع</button><p class="result" id="memR"></p></div>

<!-- ۶. شیر یا خط --><div class="game-zone"><h2>۶. 🪙 شیر یا خط</h2><button onclick="coin()">پرتاب سکه</button><p class="result" id="coinR"></p></div>

<!-- ۷. تاس --><div class="game-zone"><h2>۷. 🎲 تاس</h2><button onclick="dice()">بنداز</button><p class="result" id="diceR" style="font-size:50px"></p></div>

<!-- ۸. گل یا پوچ --><div class="game-zone"><h2>۸. ✊ گل یا پوچ</h2><button onclick="gol('گل')">🌸 گل</button><button onclick="gol('پوچ')">💨 پوچ</button><p class="result" id="golR"></p></div>

<!-- ۹. دوز XO --><div class="game-zone"><h2>۹. ⭕❌ دوز</h2><div id="xoB" style="display:grid;grid-template-columns:repeat(3,60px);gap:5px;justify-content:center;margin:10px"></div><p class="result" id="xoR"></p><button onclick="xoReset()">بازی جدید</button></div>

<!-- ۱۰. مار --><div class="game-zone"><h2>۱۰. 🐍 مار</h2><canvas id="snakeC" width="280" height="280"></canvas><p style="font-size:12px;color:#666">با کلیدهای جهت یا لمس بازی کن</p></div>

<script>
// ۱. حدس عدد
let g1n=Math.floor(Math.random()*100)+1,g1c=0;
function g1check(){let g=parseInt(document.getElementById('g1in').value);g1c++;if(g===g1n){document.getElementById('g1r').textContent='🎉 برنده!';document.getElementById('g1t').textContent='حدس: '+g1c;g1n=Math.floor(Math.random()*100)+1;g1c=0}else{document.getElementById('g1r').textContent=g<g1n?'⬆️ بالا':'⬇️ پایین'}document.getElementById('g1in').value='';}

// ۲. سنگ کاغذ قیچی
function rps(u){let o=['✊','✋','✌️'],c=o[Math.floor(Math.random()*3)],r='';if(u===c)r='مساوی 🤝';else if((u==='✊'&&c==='✌️')||(u==='✋'&&c==='✊')||(u==='✌️'&&c==='✋'))r='بردی 🎉';else r='باختی 😢';document.getElementById('rpsR').textContent='تو: '+u+' | 💻: '+c+' → '+r;}

// ۳. سرعت کلیک
let cc=0,ctl,ci;function clkTap(){if(ctl===undefined){cc=0;ctl=10;document.getElementById('clkT').textContent=10;document.getElementById('clkR').textContent='';clearInterval(ci);ci=setInterval(()=>{ctl--;document.getElementById('clkT').textContent=ctl;if(ctl<=0){clearInterval(ci);document.getElementById('clkR').textContent='🎉 '+cc+' کلیک!';ctl=undefined}},1000)}if(ctl>0)cc++;}

// ۴. ریاضی سریع
let ms=0,ma;function genM(){let a=Math.floor(Math.random()*50)+1,b=Math.floor(Math.random()*50)+1;ma=a+b;document.getElementById('mQ').textContent=a+'+'+b+'=؟';}genM();
function mCheck(){if(parseInt(document.getElementById('mIn').value)===ma){ms++;document.getElementById('mR').textContent='✅ امتیاز: '+ms;genM()}document.getElementById('mIn').value='';}

// ۵. حافظه رنگ
let mseq=[],midx=0,msc=0,mp=false;let cols=['🔴','🔵','🟢','🟡'],ccodes={'🔴':'red','🔵':'blue','🟢':'green','🟡':'yellow'};
function memStart(){mseq=[];msc=0;mp=false;addColor();}
function addColor(){mseq.push(cols[Math.floor(Math.random()*4)]);showSeq();}
function showSeq(){mp=false;let i=0;let iv=setInterval(()=>{if(i<mseq.length){document.getElementById('cBox').style.background=ccodes[mseq[i]];i++}else{clearInterval(iv);document.getElementById('cBox').style.background='gray';let h='';cols.forEach(c=>{h+='<button style="background:'+ccodes[c]+';margin:3px;padding:12px;font-size:18px;border:none;border-radius:8px;cursor:pointer" onclick="memClick(\''+c+'\')">'+c+'</button>'});document.getElementById('cBtns').innerHTML=h;mp=true;midx=0}},600);}
function memClick(c){if(!mp)return;if(c===mseq[midx]){midx++;if(midx===mseq.length){msc++;document.getElementById('memR').textContent='✅ امتیاز: '+msc;addColor()}}else{document.getElementById('memR').textContent='❌ اشتباه!';mp=false;document.getElementById('cBtns').innerHTML=''}}

// ۶. شیر یا خط
function coin(){document.getElementById('coinR').textContent=Math.random()<0.5?'🪙 شیر':'💰 خط';}

// ۷. تاس
function dice(){document.getElementById('diceR').textContent=['⚀','⚁','⚂','⚃','⚄','⚅'][Math.floor(Math.random()*6)];}

// ۸. گل یا پوچ
function gol(u){let r=Math.random()<0.5?'گل':'پوچ';document.getElementById('golR').textContent='💻: '+r+' | '+(u===r?'🎉 بردی!':'😢 باختی');}

// ۹. دوز
let xoB=Array(9).fill(''),xoT='❌',xoG=false;
function xoRender(){let h='';xoB.forEach((c,i)=>{h+='<div onclick="xoClick('+i+')" style="width:60px;height:60px;background:#f0f4ff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer">'+c+'</div>'});document.getElementById('xoB').innerHTML=h;}
function xoClick(i){if(xoB[i]||xoG)return;xoB[i]=xoT;xoRender();let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];if(w.some(c=>c.every(j=>xoB[j]===xoT))){document.getElementById('xoR').textContent=xoT+' برنده! 🎉';xoG=true}else if(!xoB.includes('')){document.getElementById('xoR').textContent='مساوی 🤝';xoG=true}else{xoT=xoT==='❌'?'⭕':'❌'}}
function xoReset(){xoB=Array(9).fill('');xoT='❌';xoG=false;xoRender();document.getElementById('xoR').textContent='';}
xoRender();

// ۱۰. مار
let snake,sDir,sFood,sScore,sInterval;
function startSnake(){let c=document.getElementById('snakeC'),ctx=c.getContext('2d');snake=[{x:10,y:10}];sDir={x:1,y:0};sFood={x:15,y:10};sScore=0;clearInterval(sInterval);sInterval=setInterval(()=>{let h={x:snake[0].x+sDir.x,y:snake[0].y+sDir.y};if(h.x<0||h.x>=28||h.y<0||h.y>=28||snake.some(p=>p.x===h.x&&p.y===h.y)){clearInterval(sInterval);alert('پایان! امتیاز: '+sScore);return}snake.unshift(h);if(h.x===sFood.x&&h.y===sFood.y){sScore++;sFood={x:Math.floor(Math.random()*28),y:Math.floor(Math.random()*28)}}else{snake.pop()}ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,280,280);ctx.fillStyle='lime';snake.forEach(p=>ctx.fillRect(p.x*10,p.y*10,8,8));ctx.fillStyle='red';ctx.fillRect(sFood.x*10,sFood.y*10,8,8)},100);
document.onkeydown=function(e){if(e.key==='ArrowUp'&&sDir.y===0)sDir={x:0,y:-1};if(e.key==='ArrowDown'&&sDir.y===0)sDir={x:0,y:1};if(e.key==='ArrowLeft'&&sDir.x===0)sDir={x:-1,y:0};if(e.key==='ArrowRight'&&sDir.x===0)sDir={x:1,y:0}};
c.ontouchstart=function(e){e.preventDefault();let t=e.touches[0],r=c.getBoundingClientRect(),x=t.clientX-r.left,y=t.clientY-r.top;if(Math.abs(x-140)>Math.abs(y-140)){sDir=x>140?{x:1,y:0}:{x:-1,y:0}}else{sDir=y>140?{x:0,y:1}:{x:0,y:-1}}}
}startSnake();
</script>
</body>
</html>
