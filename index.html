        .theme-dot:active{transform:scale(1.3)}.theme-dot.active{border-color:#000;box-shadow:0 0 10px rgba(0,0,0,.5)}

        .footer{background:rgba(255,255,255,.7);padding:12px;margin-top:12px;font-size:9px;border-radius:15px;opacity:.8}

<script>
const themes=[
    {name:'آبی آسمانی',bg:'linear-gradient(135deg,#e3f2fd,#90caf9)',color:'#0d47a1'},
    {name:'نعنایی',bg:'radial-gradient(circle at center,#0a1a1a,#1a4a4a,#66ccaa)',color:'#fff'},
    {name:'صورتی',bg:'linear-gradient(135deg,#fce4ec,#f48fb1)',color:'#880e4f'},
    {name:'بنفش',bg:'linear-gradient(135deg,#f3e5f5,#ab47bc)',color:'#4a148c'},
    {name:'سبز',bg:'linear-gradient(135deg,#e8f5e9,#66bb6a)',color:'#1b5e20'},
    {name:'نارنجی',bg:'linear-gradient(135deg,#fff3e0,#ff9800)',color:'#e65100'},
    {name:'قرمز',bg:'linear-gradient(135deg,#ffebee,#f44336)',color:'#b71c1c'},
    {name:'طوسی',bg:'linear-gradient(135deg,#f5f5f5,#bdbdbd)',color:'#333'},
    {name:'طلایی',bg:'linear-gradient(135deg,#fff8e1,#ffc107)',color:'#3e2723'},
    {name:'نیلی',bg:'linear-gradient(135deg,#e8eaf6,#5c6bc0)',color:'#1a237e'},
    {name:'دریایی',bg:'linear-gradient(135deg,#e0f7fa,#00bcd4)',color:'#006064'},
    {name:'یشمی',bg:'linear-gradient(135deg,#e0f2f1,#26a69a)',color:'#004d40'},
    {name:'اسطوخودوس',bg:'linear-gradient(135deg,#ede7f6,#7e57c2)',color:'#311b92'},
    {name:'هلویی',bg:'linear-gradient(135deg,#fbe9e7,#ff7043)',color:'#bf360c'},
    {name:'لیمویی',bg:'linear-gradient(135deg,#fffde7,#ffee58)',color:'#827717'},
    {name:'نارنگی',bg:'linear-gradient(135deg,#fff3e0,#ffab40)',color:'#e65100'},
    {name:'گیلاسی',bg:'linear-gradient(135deg,#fce4ec,#ec407a)',color:'#880e4f'},
    {name:'آسمان شب',bg:'radial-gradient(circle at center,#1a237e,#283593,#3949ab)',color:'#fff'},
    {name:'اقیانوسی',bg:'linear-gradient(135deg,#e3f2fd,#1e88e5)',color:'#0d47a1'},
    {name:'جنگلی',bg:'linear-gradient(135deg,#e8f5e9,#43a047)',color:'#1b5e20'},
    {name:'غروب',bg:'linear-gradient(135deg,#fff3e0,#ff7043,#e91e63)',color:'#3e2723'},
    {name:'کاراملی',bg:'linear-gradient(135deg,#fff8e1,#ffb300)',color:'#4e342e'},
    {name:'زمردی',bg:'linear-gradient(135deg,#e0f2f1,#00897b)',color:'#fff'},
    {name:'یاقوتی',bg:'linear-gradient(135deg,#fce4ec,#c62828)',color:'#fff'},
    {name:'کبالت',bg:'linear-gradient(135deg,#e8eaf6,#1565c0)',color:'#fff'},
    {name:'مرجانی',bg:'linear-gradient(135deg,#fbe9e7,#ff5722)',color:'#fff'},
    {name:'پسته‌ای',bg:'linear-gradient(135deg,#f1f8e9,#9ccc65)',color:'#33691e'},
    {name:'بارانی',bg:'linear-gradient(135deg,#e3f2fd,#64b5f6,#1e88e5)',color:'#0d47a1'},
    {name:'شکلاتی',bg:'linear-gradient(135deg,#efebe9,#8d6e63)',color:'#fff'},
    {name:'آتشفشانی',bg:'linear-gradient(135deg,#fff3e0,#f44336,#b71c1c)',color:'#fff'}
];

let html='';
themes.forEach((t,i)=>{
    html+='<div class="theme-dot'+(i===0?' active':'')+'" onclick="setTheme('+i+')" style="background:'+t.bg+'" title="'+t.name+'"></div>';
});
document.getElementById('themeBar').innerHTML=html;

function setTheme(i){
    let t=themes[i];
    document.getElementById('bd').style.background=t.bg;
    document.getElementById('bd').style.color=t.color;
    localStorage.setItem('rahila-theme',i);
    document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
    document.querySelectorAll('.theme-dot')[i].classList.add('active');
}
let saved=localStorage.getItem('rahila-theme');
if(saved!==null){setTheme(parseInt(saved));}
</script>
