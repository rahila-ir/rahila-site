<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏰ ساعت زنده | تقویم شمسی | rahilanab.com</title>
    <meta name="description" content="ساعت زنده و تقویم شمسی - زمان دقیق ایران">
    <meta name="keywords" content="ساعت, تقویم, زمان, شمسی, rahilanab">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Arial';background:linear-gradient(135deg,#e3f2fd,#bbdefb,#90caf9,#a5d6a7);color:#000;padding:15px;min-height:100vh;text-align:center}
        .header{background:#fff;border-radius:20px;padding:20px;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
        .header h1{color:#0d47a1;font-size:26px}
        .header p{color:#000;font-size:17px;font-weight:bold;margin-top:5px}
        .section{background:#fff;border-radius:20px;padding:30px;margin:18px 0;box-shadow:0 2px 12px rgba(0,0,0,.08)}
        .section h2{color:#0d47a1;font-size:50px;font-weight:bold}
        .section p{color:#000;font-size:18px;font-weight:bold;margin:8px 0}
        .back-btn{display:inline-block;background:#0d47a1;color:#fff;padding:12px 28px;border-radius:25px;text-decoration:none;margin:12px 0;font-weight:bold;font-size:17px}
        .footer{background:#fff;padding:16px;margin-top:20px;font-size:15px;color:#000;border-radius:15px;font-weight:bold}
        .footer a{color:#0d47a1;text-decoration:none;font-weight:bold}
    </style>
</head>
<body>
<div class="header"><h1>⏰ ساعت زنده</h1><p>rahilanab.com</p></div>
<div class="section">
    <h2 id="timeDisplay">--:--:--</h2>
    <p id="dateDisplay">---</p>
</div>
<a href="index.html" class="back-btn">🔙 بازگشت به خانه</a>
<div class="footer"><p>🌟 rahilanab.com | <a href="index.html">🏠 خانه</a></p></div>
<script>
function updateClock(){
    let now=new Date();
    document.getElementById('timeDisplay').textContent=now.toLocaleTimeString('fa-IR');
    document.getElementById('dateDisplay').textContent=now.toLocaleDateString('fa-IR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(updateClock,1000);updateClock();
</script>
</body>
</html>
