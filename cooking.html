<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍳 آشپزی | صبحانه، ناهار، شام | رهیلا</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:radial-gradient(circle at center,#0a1a1a,#1a4a4a,#66ccaa);color:#fff;text-align:center;padding:15px;min-height:100vh}
        .header{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border-radius:25px;padding:20px;margin-bottom:15px}
        .header h1{color:#ffd700;font-size:22px}
        .back-btn{display:inline-block;background:rgba(255,255,255,.15);color:#fff;padding:8px 20px;border-radius:20px;text-decoration:none;margin:10px 0;font-size:14px}
        .section-title{color:#ffd700;font-size:18px;margin:20px 0 10px}
        .food-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
        .food-card{background:rgba(255,255,255,.05);border-radius:15px;padding:15px;border:1px solid rgba(255,255,255,.1);transition:.3s;text-decoration:none;color:#fff;text-align:right}
        .food-card:active{background:rgba(255,215,0,.2)}
        .food-card h3{font-size:14px;color:#ffd700}
        .food-card p{font-size:11px;color:#aaa;margin-top:3px}
        .emoji-big{font-size:40px}
    </style>
</head>
<body>
    <div class="header">
        <h1>🍳 آشپزی رهیلا</h1>
        <p>صبحانه، ناهار، شام، دسر، کیک، شیرینی، دمنوش و...</p>
    </div>
    <a href="index.html" class="back-btn">🔙 برگشت به خانه</a>

    <!-- صبحانه -->
    <div class="section-title">🌅 صبحانه</div>
    <div class="food-grid">
        <div class="food-card"><h3>🥚 املت</h3><p>ساده و خوشمزه</p></div>
        <div class="food-card"><h3>🍳 نیمرو</h3><p>صبحانه کلاسیک</p></div>
        <div class="food-card"><h3>🥞 پنکیک</h3><p>نرم و پفکی</p></div>
        <div class="food-card"><h3>🧇 وافل</h3><p>صبحانه مدرن</p></div>
        <div class="food-card"><h3>🥣 فرنی</h3><p>مقوی و ساده</p></div>
        <div class="food-card"><h3>🍞 تست فرانسوی</h3><p>صبحانه خاص</p></div>
    </div>

    <!-- ناهار -->
    <div class="section-title">☀️ ناهار</div>
    <div class="food-grid">
        <div class="food-card"><h3>🍲 قورمه سبزی</h3><p>غذای اصیل ایرانی</p></div>
        <div class="food-card"><h3>🍲 قیمه</h3><p>با سیب‌زمینی</p></div>
